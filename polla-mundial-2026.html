const MAX_PTS = 94;

function getBg(pos) {
  // Gradiente dinamico: verde (1er lugar) -> amarillo -> rojo (ultimo lugar)
  var maxPos = participants[participants.length - 1].pos;
  var t = Math.min(Math.max((pos - 1) / (maxPos - 1), 0), 1);
  var hue = 120 - (t * 120); // 120=verde, 0=rojo
  var sat = 45 - (t * 5);
  var light = 32 - (t * 4);
  return 'hsl(' + hue.toFixed(0) + ',' + sat.toFixed(0) + '%,' + light.toFixed(0) + '%)';
}
function getProgColor(pos) {
  if (pos===1)   return '#3dba3d';
  if (pos===7)   return '#5dc85d';
  if (pos===25)  return '#7acd5a';
  if (pos===37||pos===39) return '#9ad06a';
  if (pos===61)  return '#b0cc70';
  if (pos===128) return '#aaa';
  if (pos===149) return '#c8a040';
  if (pos===158) return '#d07070';
  return '#a05050';
}
function getMedal(pos) {
  if (pos===1) return '🥇';
  if (pos===2) return '🥈';
  if (pos===3) return '🥉';
  return null;
}
function normalize(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}
function highlight(nombre, q) {
  if (!q) return nombre;
  const nq=normalize(q), nn=normalize(nombre);
  const idx=nn.indexOf(nq);
  if (idx===-1) return nombre;
  return nombre.slice(0,idx)+'<mark>'+nombre.slice(idx,idx+q.length)+'</mark>'+nombre.slice(idx+q.length);
}
var VIEW_MODE = 'puntos';
var PARTIDOS_JUGADOS = 73;

function getPagina(p) {
  var idx = participants.indexOf(p);
  if (idx <= 84)  return 'pág 1';
  if (idx <= 168) return 'pág 2';
  return 'pág 3';
}

function buildCard(p, q) {
  var bg = getBg(p.pos);
  var medal = getMedal(p.pos);
  var pagina = getPagina(p);
  var otraPos = otraTablaRanking[p.nombre] || '?';

  var badgeContent, badgeClass;
  if (VIEW_MODE === 'puntos') {
    badgeContent = medal
      ? '<span class="medal">' + medal + '</span><span class="pos-num-sm">#' + p.pos + '</span><span style="font-size:8px;color:#aaa;margin-top:1px">' + pagina + '</span>'
      : '<span class="pos-num">#' + p.pos + '</span><span style="font-size:8px;color:#aaa;margin-top:2px">' + pagina + '</span>';
    badgeClass = medal ? 'pos-badge' : 'pos-badge no-medal';
  } else {
    badgeContent = medal
      ? '<span class="medal">' + medal + '</span><span class="pos-num-sm">#' + p.pos + '</span><span style="font-size:9px;color:#f0c040;margin-top:1px;font-weight:700">☠️' + otraPos + '</span>'
      : '<span class="pos-num">#' + p.pos + '</span><span style="font-size:9px;color:#f0c040;margin-top:2px;font-weight:700">☠️' + otraPos + '</span>';
    badgeClass = medal ? 'pos-badge' : 'pos-badge no-medal';
  }

  var isFav = getFavorites().includes(p.nombre);
  var starIcon = isFav ? '⭐' : '☆';
  var safeName = p.nombre.replace(/'/g, "\\'");

  var soloGanador = p.puntos - 4 * p.exactos;
  var totalAciertos = soloGanador + p.exactos;
  var pctAcierto = Math.round(totalAciertos / PARTIDOS_JUGADOS * 100);

  var statsHtml;
  if (VIEW_MODE === 'puntos') {
    statsHtml =
      '<div class="stat"><div class="stat-val pts">' + p.puntos + '</div><div class="stat-label">pts</div></div>' +
      '<div class="stat"><div class="stat-val exactos">' + p.exactos + '</div><div class="stat-label">exactos</div></div>';
  } else {
    statsHtml =
      '<div class="stat"><div class="stat-val ganador-pct">' + pctAcierto + '%</div><div class="stat-label">%</div></div>' +
      '<div class="stat"><div class="stat-val exactos">' + totalAciertos + '</div><div class="stat-label">de ' + PARTIDOS_JUGADOS + '</div></div>';
  }

  return '<div class="card"><div class="card-top">' +
    '<div class="' + badgeClass + '" style="background:' + bg + '">' + badgeContent + '</div>' +
    '<div class="card-name">' + highlight(p.nombre, q) + '</div>' +
    '<div class="card-stats">' + statsHtml + '</div>' +
    '<button class="fav-btn" onclick="toggleFavorite(\'' + safeName + '\')">' + starIcon + '</button>' +
    '</div></div>';
}


// FAVORITOS (guardados en cache del navegador)
function getFavorites() {
  try {
    var raw = localStorage.getItem('polla_favoritos');
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}
function setFavorites(list) {
  try { localStorage.setItem('polla_favoritos', JSON.stringify(list)); } catch(e) {}
}
function toggleFavorite(nombre) {
  var favs = getFavorites();
  if (favs.indexOf(nombre) > -1) {
    favs = favs.filter(function(n) { return n !== nombre; });
  } else {
    favs.push(nombre);
  }
  setFavorites(favs);
  render(searchEl.value.trim());
  renderFavorites();
}
function renderFavorites() {
  var favs = getFavorites();
  var favSection = document.getElementById('fav-section');
  var favResults = document.getElementById('fav-results');
  if (favs.length === 0) {
    favSection.style.display = 'none';
    return;
  }
  favSection.style.display = 'block';
  var favParticipants = participants.filter(function(p) { return favs.indexOf(p.nombre) > -1; });
  if (VIEW_MODE === 'ganador') {
    favParticipants = favParticipants.slice().sort(function(a, b) {
      return getAcierto(b) - getAcierto(a);
    });
  }
  favResults.innerHTML = favParticipants.map(function(p) { return buildCard(p, ''); }).join('');
}

const searchEl = document.getElementById('search');
const clearBtn = document.getElementById('clear-btn');
const noResults = document.getElementById('no-results');
const noResultsText = document.getElementById('no-results-text');
const resultCount = document.getElementById('result-count');
const resultsEl = document.getElementById('results');

function vibrate() {
  if (navigator.vibrate) navigator.vibrate([80,40,80]);
  resultsEl.classList.remove('vibrate');
  void resultsEl.offsetWidth;
  resultsEl.classList.add('vibrate');
}
function getAcierto(p) {
  var soloGanador = p.puntos - 4 * p.exactos;
  return soloGanador + p.exactos;
}

// Precalcular ranking "La otra tabla" (por acierto, mayor a menor)
var otraTablaRanking = {};
(function() {
  var sorted = participants.slice().sort(function(a, b) {
    return getAcierto(b) - getAcierto(a);
  });
  var rank = 1;
  for (var i = 0; i < sorted.length; i++) {
    if (i > 0 && getAcierto(sorted[i]) < getAcierto(sorted[i-1])) rank = i + 1;
    otraTablaRanking[sorted[i].nombre] = rank;
  }
})();

function render(q) {
  clearBtn.style.display = q ? 'block' : 'none';
  const nq = normalize(q);
  var found = q ? participants.filter(p => normalize(p.nombre).includes(nq)) : participants.slice();
  if (found.length === 0) {
    noResults.style.display = 'block';
    noResultsText.innerHTML = 'No se encontró <strong>"'+q+'"</strong>';
    resultCount.textContent = '';
    resultsEl.innerHTML = '';
    return;
  }
  // Si modo acierto, ordenar por % acierto de mayor a menor
  if (VIEW_MODE === 'ganador') {
    found = found.slice().sort(function(a, b) {
      return getAcierto(b) - getAcierto(a);
    });
  }
  noResults.style.display = 'none';
  resultCount.textContent = q
    ? found.length+' resultado'+(found.length!==1?'s':'')+' de '+participants.length
    : participants.length+' participantes';
  resultsEl.innerHTML = found.map(p => buildCard(p, q)).join('');
  if (q && found.length > 0) vibrate();
}
searchEl.addEventListener('input', function(){ render(this.value.trim()); });
clearBtn.addEventListener('click', function(){ searchEl.value=''; render(''); searchEl.focus(); });
render('');
renderFavorites();

function cdFormat(diff, colorDias) {
  if (diff <= 0) return null;
  var days    = Math.floor(diff / (1000*60*60*24));
  var hours   = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  var minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
  var seconds = Math.floor((diff % (1000*60)) / 1000);
  var html = '';
  if (days > 0) html += '<span style="font-size:22px;font-weight:900;color:'+colorDias+'">'+days+'</span><span style="color:#888;font-size:10px"> d </span>';
  html += '<span style="font-size:18px;font-weight:700;color:#fff">'+hours+'</span><span style="color:#888;font-size:10px">h </span>';
  html += '<span style="font-size:18px;font-weight:700;color:#fff">'+minutes+'</span><span style="color:#888;font-size:10px">m </span>';
  html += '<span style="font-size:16px;font-weight:700;color:#aaa">'+seconds+'</span><span style="color:#888;font-size:10px">s</span>';
  return html;
}

var SLOT_COLORS = ['#ff9090', '#7cc8ff', '#f0c040'];
var SLOT_IDS    = [
  { title:'cd1-title', fecha:'cd1-fecha', cd:'countdown-1' },
  { title:'cd2-title', fecha:'cd2-fecha', cd:'countdown-2' },
  { title:'cd3-title', fecha:'cd3-fecha', cd:'countdown-display' },
];

// Cola unificada de todos los partidos en orden cronológico
var ALL_PARTIDOS = []
  .concat(PARTIDOS_SLOTS[0])
  .concat(PARTIDOS_SLOTS[1])
  .sort(function(a,b){ return new Date(a.dt) - new Date(b.dt); });

function getActivePartidos() {
  var now = new Date();
  var active = [];
  var seen = {};
  for (var i = 0; i < ALL_PARTIDOS.length; i++) {
    var p = ALL_PARTIDOS[i];
    if (seen[p.dt]) continue; // evitar duplicados por hora
    seen[p.dt] = true;
    var end = new Date(new Date(p.dt).getTime() + 90*60*1000);
    if (now < end) active.push(p);
  }
  return active;
}

function updateSlot(slotIdx) {
  var ids   = SLOT_IDS[slotIdx];
  var color = SLOT_COLORS[slotIdx];
  var now   = new Date();

  var titleEl = document.getElementById(ids.title);
  var fechaEl = document.getElementById(ids.fecha);
  var cdEl    = document.getElementById(ids.cd);
  if (!titleEl || !fechaEl || !cdEl) return;

  if (slotIdx === 2) {
    // Slot 3 siempre es la Final
    var final = PARTIDOS_SLOTS[2][0];
    titleEl.textContent = final.label;
    fechaEl.textContent = final.fecha;
    var diff = new Date(final.dt) - now;
    if (diff <= 0) {
      cdEl.innerHTML = '<span style="font-size:11px;color:'+color+'">🎉 ¡Hoy es la Final!</span>';
    } else {
      cdEl.innerHTML = cdFormat(diff, color);
    }
    return;
  }

  var active = getActivePartidos();
  var partido = active[slotIdx] || null;

  if (!partido) {
    var card = titleEl.closest('div[style*="flex:1"]');
    if (card) card.style.display = 'none';
    return;
  }

  // Asegurarse que el card esté visible
  var card2 = titleEl.closest('div[style*="flex:1"]');
  if (card2) card2.style.display = '';

  titleEl.textContent = partido.label;
  fechaEl.textContent = partido.fecha;

  var diff2 = new Date(partido.dt) - now;
  if (diff2 <= 0) {
    cdEl.innerHTML = '<span style="font-size:11px;color:'+color+'">⚽ En curso</span>';
  } else {
    cdEl.innerHTML = cdFormat(diff2, color);
  }
}

function updateAllCountdowns() {
  updateSlot(0);
  updateSlot(1);
  updateSlot(2);
}

updateAllCountdowns();
setInterval(updateAllCountdowns, 1000);
